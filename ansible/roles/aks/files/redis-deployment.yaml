apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      imagePullSecrets:
      - name: acr-secret

      containers:
      - name: redis
        image: acrcasopractico2madp.azurecr.io/redis:6.0.8
        ports:
        - containerPort: 6379

        env:
        - name: ALLOW_EMPTY_PASSWORD
          value: "yes"

        volumeMounts:
        - name: redis-storage
          mountPath: /data

      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc