apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-vote-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azure-vote-front
  template:
    metadata:
      labels:
        app: azure-vote-front
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: azure-vote-front
        image: acrcasopractico2madp.azurecr.io/azure-vote-front:latest
        ports:
        - containerPort: 80
        env:
        - name: REDIS
          value: "redis"